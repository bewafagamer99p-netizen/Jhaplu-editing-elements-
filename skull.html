<title>Skull Face PNG Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#050b18;
    text-align: center;
    background-image:radial-gradient(circle at top,#003366,#050b18 70%);
    color:#fff;
}
button {
             background-color: black;
             color:#00cfff;
             border: 2px solid #00cfff;
             padding: 12px 25px;
             border-radius: 25px;
             font-weight: bold;
             box-shadow: 0 0 10px #00cfff;
        }
        button:hover{
    background:#00cfff;
    color:black;
    transform:scale(1.05);
}

/* Header */

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-size:36px;
    color:#00cfff;
    text-shadow:
    0 0 10px #00cfff,
    0 0 25px #00aaff,
    0 0 40px #0088ff;
}

header p{
    margin-top:10px;
    color:#b8eaff;
    font-size:16px;
}

/* Grid */

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:25px;
    padding:20px 0 50px;
}

/* Card */

.card{
    background:#0f1725;
    border:2px solid #00bfff;
    border-radius:18px;
    overflow:hidden;
    transition:0.35s;
    box-shadow:0 0 12px rgba(0,191,255,0.35);
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:
    0 0 15px #00cfff,
    0 0 30px rgba(0,191,255,.8);
}

/* Image */

.card img{
    width:100%;
    height:260px;
    object-fit:contain;
    background:#08111f;
    padding:15px;
}

/* Content */

.card-content{
    padding:18px;
    text-align:center;
}

.card-content h3{
    margin-bottom:15px;
    color:#eafcff;
    text-shadow:0 0 8px rgba(0,191,255,.6);
}

/* Download Button */

.download-btn{
    display:inline-block;
    text-decoration:none;
    background:linear-gradient(135deg,#0099ff,#00d4ff);
    color:#fff;
    font-weight:bold;
    padding:12px 22px;
    border-radius:30px;
    transition:0.3s;
    box-shadow:0 0 12px rgba(0,191,255,.5);
}

.download-btn:hover{
    transform:scale(1.08);
    box-shadow:
    0 0 15px #00cfff,
    0 0 30px #00cfff;
}

/* Footer */

footer{
    text-align:center;
    padding:20px;
    border-top:1px solid rgba(0,191,255,.3);
    color:#9edfff;
    margin-top:20px;
}

/* Mobile */

@media(max-width:600px){
    header h1{
        font-size:28px;
    }

    .card img{
        height:200px;
    }

    .download-btn{
        width:100%;
    }
}
</style>

</head>
